<!DOCTYPE HTML>
<html>
    <head>
        <title>form</title>
    </head>
    <body>
        <form action="index.php" method="POST" enctype="multipart/form-data">
            <label for="usermname">username:</label>
            <input type="text" id="username" placeholder="John Smith" minlength="6" maxlength="15" required>
            
            <br><br><label for="password">password:</label>
            <input type="password" id="password" minlength="6" maxlength="15" required ><br>
            
            <br><label for="email">email:</label>
            <input type="email" id="email" placeholder="squarepant@gmail.com" required ><br>
            
            <br><label for="phone">phone:</label>
            <input type="tel" id="phone" placeholder="+251-90-000-0000" pattern="\+[0-9]{3}-[0-9]{2}-[0-9]{3}-[0-9]{4}"><br>
            
            <br><label for="bday">birthdate:</label>
            <input type="date" id="bday" ><br>

            <br><label for="quantity">quantity:</label>
            <input type="number" id="quantity" min="0" max="99" value="1"><br>

            <br><label for="title">title:</label>
            
            <label for="Mr.">Mr.</label>
            <input type="radio" id="Mr." value="Mr." name="title">
            <label for="Ms.">Ms.</label>
            <input type="radio" id="Ms." value="Ms." name="title">
            <label for="PhD.">PhD.</label>
            <input type="radio" id="PhD." value="PhD." name="title"><br>

            <br><label for="payment">payment</label>
            <select id="payment">
                <option value="visa">visa</option>
                <option value="mastercard">mastercard</option>
                <option value="giftcard">giftcard</option>
            </select><br>

            <br><label for="subscribe">subscribe:</label>
            <input type="checkbox" id="subscribe" ><br>

            <br><label for="like">like:</label>
            <input type="checkbox" id="like" ><br>

            <br><label for="comment">comment:</label>
            <textarea id="comment"></textarea><br>

            <br><label for="file">file:</label>
            <input type="file" id="file" accept="image/png,image/jpg"><br>



            <br><input type="reset"><br>
            <input type="submit">
            <br><br>
        </form>
    </body>
</html>
